name: User Service CI/CD

on:
  push:
    branches:
      - tasks/USR-0
  pull_request:
    branches:
      - main

jobs:

  ci:
    name: CI - Build, Test, SonarQube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build & run tests
        env:
          SPRING_PROFILES_ACTIVE: test
        run: mvn clean verify

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: SonarQube analysis
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw clean verify sonar:sonar \
            -Dsonar.login=${SONAR_TOKEN} \
            -Dsonar.projectKey=DaryaMashniuk_ShopProject_UserService \
            -Dsonar.organization=daryamashniuk \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.exclusions=**/dto/**,**/model/**,**/config/**,**/exception/**,**/*Application.java
  
  

  cd:
    name: CD - Build & Push Docker Image
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/userservice:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/userservice:latest