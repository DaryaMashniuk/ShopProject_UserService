databaseChangeLog:
  - changeSet:
      id: 001-create-tables
      author: Darya
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: surname
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: true
              - column:
                  name: birth_date
                  type: DATE
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

        - createTable:
            tableName: payment_cards
            columns:
                - column:
                    name: id
                    type: BIGINT
                    autoIncrement: true
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: user_id
                    type: BIGINT
                    constraints:
                      nullable: false
                - column:
                    name: expiration_date
                    type: DATE
                    constraints:
                      nullable: false
                - column:
                    name: holder
                    type: VARCHAR(150)
                    constraints:
                      nullable: false
                - column:
                    name: number
                    type: VARCHAR(16)
                    constraints:
                      nullable: false
                - column:
                    name: active
                    type: BOOLEAN
                    defaultValueBoolean: true
                - column:
                    name: created_at
                    type: TIMESTAMP
                - column:
                    name: updated_at
                    type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: payment_cards
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_payment_cards_user
        - createIndex:
            tableName: users
            indexName: idx_users_name_surname
            columns:
              - column: { name : name}
              - column: { name: surname}
        - createIndex:
            tableName: payment_cards
            indexName: idx_payment_cards_user_id
            columns:
              - column: { name: user_id}

