volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: user-service-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME_DOCKER}
      POSTGRES_PASSWORD: ${DB_PASSWORD_DOCKER}
      POSTGRES_DB: ${DB_NAME_DOCKER}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      SPRING_DATASOURCE_URL: 'jdbc:postgresql://user-service-db:5432/user_service_db'
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME_DOCKER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD_DOCKER}
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_REDIS_HOST: user-service-redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  redis:
    image: redis:7
    container_name: user-service-redis
    restart: always
    ports:
      - "6379:6379"
    command: [ "redis-server", "--save", "60", "1", "--loglevel", "warning" ]
    volumes:
      - redis_data:/data